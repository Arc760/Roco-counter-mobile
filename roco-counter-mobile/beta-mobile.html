<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>计数器</title>

<style>
  body { text-align:center; font-family:Arial; }
  .item { display:inline-block; margin:10px; }
  img { width:120px; cursor:pointer; }
  .count { font-size:18px; }
  #stats { margin-top:20px; font-size:20px; }
  
  .top-bar {
    position: relative;
    height: 50px;
}

.reset-btn {
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  color: rgb(255, 255, 255);

  background: linear-gradient(135deg, #00d5ff);
  border: none;
  border-radius: 12px;

  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);

  transition: all 0.2s ease;

  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.reset-btn:hover {
  transform: translateX(-50%) scale(1.05); /* ⭐必须带回居中 */
  box-shadow: 0 6px 14px rgba(0,0,0,0.4);
}

.reset-btn:active {
  transform: translateX(-50%) scale(0.95); /* ⭐同理 */
}

.undo-btn {
  background: none;
  border: none;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;

  color: #000dff;

  padding: 5px 10px;
  border-radius: 8px;
}

.undo-btn:hover {
  transform: scale(1.2);
  color: #000;
}

/* 左文本 */
.left-text {
  position: absolute;
  right: calc(50% + 80px);
  top: 50%;
  transform: translateY(-50%);
  font-weight:bold;
}

.right-group {
  position: absolute;
  left: calc(50% + 80px); /* 紧贴Reset右边 */
  display: flex;
  align-items: center;
  gap: 6px;
}

.desc {
  font-size: 14px;
  color: #666;
}

.menu {
  position: absolute;
  display: none;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  padding: 8px;
  z-index: 9999;
  width: 320px;
}

/* 双列容器 */
.menu-grid {
  display: flex;
}

/* 左列：属性 */
.menu-left {
  width: 40%;
  border-right: 1px solid #eee;
}

/* 右列：精灵 */
.menu-right {
  width: 60%;
  padding-left: 10px;
}

.menu-item {
  padding: 6px;
  cursor: pointer;
  border-radius: 6px;
}

.menu-item:hover {
  background: #f2f2f2;
}

</style>
</head>

<body>

<div class="top-bar">

  <div class="left-text">点击图片计数</div>

  <button class="reset-btn" onclick="resetAll()">Reset</button>
  <div class="right-group">
    <button class="undo-btn" onclick="undo()">⮪</button>
    <span class="desc">点击+1|右滑-1|长按选择数值|右滑重置菜单</span>
  </div>

</div>

<div id="container"></div>
<div id="stats"></div>


<script>

let pressTimer = null;
let currentIndex = null;

let historyStack = [];
    
// 🔥 S1赛季异色精灵
let items = [
  { name: "柴渣虫",
   type: ["火系","草系" ],
   count: 0,
   img: "roco-image/chai.png" },
  { name: "双灯鱼", 
  type: ["水系","电系"],
  count: 0, 
  img: "roco-image/fish.png" },
  { name: "月牙雪熊", 
  type: ["冰系","幻系"], 
  count: 0, 
  img: "roco-image/bear.png" },
  { name: "粉粉星", 
  type: ["电系","幻系"], 
  count: 0, 
  img: "roco-image/star.png" },
  { name: "空空颅", 
  type: "幽系", 
  count: 0, 
  img: "roco-image/skull.png" },
  { name: "嗜光嗡嗡", 
  type: ["光系","恶系"], 
  count: 0, 
  img: "roco-image/mosquito.png" },
  { name: "贝瑟", 
  type: ["火系","机械系"], 
  count: 0, 
  img: "roco-image/pot.png" },
  { name: "粉星仔", 
  type: "幻系", 
  count: 0, 
  img: "roco-image/zai.png" },
  { name: "格兰种子", 
  type: "草系", 
  count: 0, 
  img: "roco-image/seed.png" },
  { name: "奇丽草", 
  type: "草系", 
  count: 0, 
  img: "roco-image/grass.png" },
  { name: "治愈兔", 
  type: ["火系","萌系"], 
  count: 0, 
  img: "roco-image/rabbit.png" },
  { name: "呼呼猪", 
  type: ["冰系","地系"], 
  count: 0, 
  img: "roco-image/pig.png" },
  { name: "大耳帽兜", 
  type: ["冰系","萌系"], 
  count: 0, 
  img: "roco-image/dou.png" },
  { name: "拉特", 
  type: "电系", 
  count: 0, 
  img: "roco-image/rai.png" },
  { name: "恶魔狼", 
  type: "恶系", 
  count: 0, 
  img: "roco-image/wolf.png" },
  { name: "机械方方", 
  type: "机械系", 
  count: 0, 
  img: "roco-image/cube.png" },
  { name: "绒绒", 
  type: "绒绒", 
  count: 0, 
  img: "roco-image/rong.png" },
  { name: "犀角鸟", 
  type: "犀角鸟", 
  count: 0, 
  img: "roco-image/mop.png" },
  { name: "火红尾", 
  type: "火系", 
  count: 0, 
  img: "roco-image/horse.png" }
];

function loadData() {
  let saved = localStorage.getItem("items");

  if (saved) {
    let parsed = JSON.parse(saved);

    // ⭐ 防止数据结构坏掉
    if (Array.isArray(parsed)) {
      items = parsed;
    }
  }
}

function saveData() {
  localStorage.setItem("items", JSON.stringify(items));
}

let startX = 0;
let startY = 0;

function bindTouch(el, i) {

  el.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    pressTimer = setTimeout(() => {
      showNumberPicker(i); // 长按
    }, 600);
  });

  el.addEventListener("touchend", (e) => {
    clearTimeout(pressTimer);

    let dx = e.changedTouches[0].clientX - startX;

    if (dx > 50) {
      minusOne(i); // 👉 右滑 -1
    } else if (dx < -50) {
      addOne(i); // 👈 左滑 +1（你也可以改）
    } else {
      addOne(i); // 点击 +1
    }
  });

}

function saveHistory() {
  historyStack.push(JSON.stringify(items));
}

  // 防止无限增长（最多50步）
  if (historyStack.length > 50) {
    historyStack.shift();
  }



 //重置按钮
function undo() {
  if (historyStack.length === 0) {
    alert("没有可撤回的操作");
    return;
  }

  let lastState = historyStack.pop();

  items = JSON.parse(lastState);

  saveData();
  render();
}

//确认重置弹窗
function resetAll() {
  saveHistory();

  if (confirm("确定要重置所有数据吗？")) {
    items.forEach(item => item.count = 0);
    updateStats();
    render();
  }
}

function render() {
  const container = document.getElementById("container");

  container.innerHTML += `
  <div class="item" data-index="${i}">

    <img src="${item.img}">

    <div>${item.name}</div>
    <div class="count">数量: ${item.count}</div>

  </div>
`;
  });

  updateStats();

  // ⭐⭐⭐ 关键：DOM生成完再绑定手势
  setTimeout(() => {
    document.querySelectorAll(".item").forEach((el, i) => {
      bindTouch(el, i);
    });
  }, 0);
}

  document.addEventListener("DOMContentLoaded", function () {

  let btn = document.querySelector(".reset-btn");
  

  if (!btn) {
    console.log("❌ reset-btn 没找到");
    return;
  }

  btn.addEventListener("contextmenu", function (e) {
    e.preventDefault();
    showResetMenu(e.pageX, e.pageY);
  });

});

// 属性统计
function updateStats() {
  let stats = {};

  items.forEach(item => {

    let types = Array.isArray(item.type)
      ? item.type
      : item.type.split(",");

    types.forEach(t => {
      t = t.trim();

      if (!stats[t]) stats[t] = 0;
      stats[t] += item.count;
    });

  });


  let text = "<h3>统计</h3>";
  let hasData = false;

  for (let t in stats) {
    text += `${t}: ${stats[t]}   `;
    hasData = true;
  }

  if (!hasData) {
    text += "暂无数据";
  }

  document.getElementById("stats").innerHTML = text;
}

loadData();
render();
function showTypeMenu(x, y) {
  let menu = document.getElementById("typeMenu");

  let typeMap = {};

  items.forEach(item => {
    let types = Array.isArray(item.type)
      ? item.type
      : item.type.split(",");

    types.forEach(t => {
      t = t.trim();
      if (!typeMap[t]) typeMap[t] = [];
      typeMap[t].push(item);
    });
  });

  let types = Object.keys(typeMap);

  menu.innerHTML = "";

  let container = document.createElement("div");
  container.className = "menu-grid";

  let left = document.createElement("div");
  left.className = "menu-left";

  let right = document.createElement("div");
  right.className = "menu-right";

  // 🟢 默认显示全部
  renderRightList(items, right);

  // 🟢 左侧 type
  types.forEach(t => {
    let div = document.createElement("div");
    div.className = "menu-item";
    div.innerText = t;

    div.onclick = function (e) {
      e.stopPropagation(); // ⭐防止触发关闭菜单

      resetByType(t);
      renderRightList(typeMap[t], right);
    };

    left.appendChild(div);
  });

  container.appendChild(left);
  container.appendChild(right);

  menu.appendChild(container);

  menu.style.left = x + "px";
  menu.style.top = y + "px";
  menu.style.display = "block";
}

function renderRightList(list, right) {
  right.innerHTML = "";

  list.forEach(item => {
    let div = document.createElement("div");
    div.className = "menu-item";

    div.innerText = `${item.name} (${item.count})`;

    div.onclick = function () {
      item.count = 0;
      saveData();
      render();
    };

    right.appendChild(div);
  });
}


function resetByType(type) {
  items.forEach(item => {

    let types = Array.isArray(item.type)
      ? item.type
      : item.type.split(",");

    types = types.map(t => t.trim());

    if (types.includes(type)) {
      item.count = 0;
    }
  });

  saveData();
  render();
}

document.addEventListener("click", function () {
  const menu = document.getElementById("typeMenu");
  if (menu) menu.style.display = "none";
});

</script>
<div id="typeMenu" class="menu"></div>
</body>
</html>
