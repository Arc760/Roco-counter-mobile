<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>计数器</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      -webkit-user-select: none;
      user-select: none;
}
    .item {
  background: white;
  border-radius: 8px;
  padding: 4px;
  text-align: center;

  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
    .item img {
  width: 100%;
  height: 60px;
  object-fit: cover;
  border-radius: 6px;

  touch-action: none;
}
    img {
  pointer-events: none;
  user-select: none;
}
    @media (max-width: 768px) {
  #container {
    grid-template-columns: repeat(5, 1fr);
  }
}
    button {
  border: none;
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 12px;

  background: #00bfff;
  color: white;

  cursor: pointer;
}
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 8px;
  background: white;

  border-bottom: 1px solid #ddd;
}

.left {
  display: flex;
  gap: 6px;
}

.center {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: #333;
}

.mini-btn {
  font-size: 12px;
  padding: 4px 8px;
  border: none;
  border-radius: 6px;

  background: #00bfff;
  color: white;
}
    button:active {
  transform: scale(0.95);
}
    #container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 8px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 10px;
  }

.stats {
  margin: 10px;
  padding: 10px;

  background: white;
  border-radius: 10px;

  font-size: 14px;
  text-align: center;

  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
  </style>
</head>

<body>

 <div class="top-bar">

  <div class="left">
    <button class="mini-btn" onclick="undo()">⮪</button>
    <button class="mini-btn" onclick="resetAll()">重置</button>
  </div>

  <div class="center">
    <div id="text1">统计：0</div>
    <div id="text2">点击+1 | 右滑-1 |长按输入</div>
  </div>

</div>

<div id="container"></div>

<div id="stats" class="stats"></div>

<script src="./mobile-script.js" defer></script>

</body>
</html>
