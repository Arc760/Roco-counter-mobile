<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>计数器</title>
  <style>
    body { font-family: sans-serif;
     }
     
  .item {
      width: 120px;
      display: inline-block;
      margin: 10px;
      text-align: center;
    }
  img { width: 100px;
      height: 100px;
      user-select: none;
      touch-action: none; }
  .top-bar {
    position: sticky;
    top: 0;
    background: white;
    padding: 10px;
    z-index: 10;
  }

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 10px;
  }

.item {
    text-align: center;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 8px;
  }

.item img {
    width: 100%;
    height: 90px;
    object-fit: cover;
    border-radius: 8px;
  }
      
  </style>
</head>

<body>

  <div class="top-bar">
  <button onclick="undo()">撤回</button>
  <button onclick="resetAll()">重置</button>

  <div id="text1">统计信息</div>
  <div id="text2">提示信息</div>
  </div>

<div id="container" class="grid"></div>
<div id="container"></div>

<script src="./mobile-script.js" defer></script>

</body>
</html>
