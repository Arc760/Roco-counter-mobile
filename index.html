<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>计数器</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
  user-select: none;
  display: flex;
  flex-direction: column;
}

/* 顶部栏 */
.top-bar {
  position: relative;
  height: 50px;
  display: flex;
  align-items: center;
}

/* 居中按钮组 */
.center-group {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  align-items: center;
  gap: 6px;
}

/* 左侧提示文字 */
.left-text {
  margin-left: 10px;
  font-size: 11px;
  color: #666;
}

/* 按钮样式统一 */
.reset-btn, .undo-btn {
  font-size: 12px;
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  background: #00bfff;
  color: white;
}

.reset-btn {
  touch-action: none;
  user-select: none;
}
.undo-btn {
  font-weight: bold;
}

/* 按钮 */
button {
  font-size: 12px;
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  background: #00bfff;
  color: white;
}

button:active {
  transform: scale(0.95);
}

/* 网格 */
#container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 6px;
  padding: 8px;
}
#stats {
  width: 100%;
}

/* 宠物图片*/
.item {
  background: white;
  border-radius: 10px;
  padding: 6px;
  text-align: center;

  box-shadow: 0 2px 6px rgba(0,0,0,0.08);

  display: flex;
  flex-direction: column;
  align-items: center;   /* ⭐居中 */
  justify-content: center;

  transition: transform 0.12s ease; /*动画*/

  touch-action: none;
}

.item img {
  width: 90%;
  height: 70px;
  object-fit: contain;

  display: block;
  margin: 0 auto;   /* ⭐强制居中 */
}

.item:active {
  transform: scale(0.92);
}

.count {
  font-size: 12px;
  font-weight: bold;

  color: #aaa; /* 默认灰色 */
}

.count.active {
  color: #00bfff;
}


/* 统计 */
.stats {
  margin: 10px;
  padding: 10px;
  background: white;
  border-radius: 10px;
  font-size: 13px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.menu {
  position: absolute;
  display: none;
  z-index: 9999;
  background: white;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  border-radius: 10px;
  padding: 8px;
  width: 260px;
}

.menu-grid {
  display: flex;
}

.menu-left,
.menu-right {
  width: 50%;
  max-height: 300px;
  overflow-y: auto;
}

.menu-left {
  border-right: 1px solid #eee;
}

.menu-item {
  padding: 6px;
  font-size: 12px;
  text-align: center;
  cursor: pointer;
  border-radius: 6px;
}

.menu-item:hover {
  background: #f2f2f2;
}

</style>
</head>

<body>

<!-- 顶部 -->
<div class="top-bar">

  <div class="center-group">
    <button class="reset-btn">重置</button>
    <button class="undo-btn">⮪</button>
  </div>

  <div class="left-text">
    点击+1 | 右滑-1 |长按输入
  </div>

</div>

<!-- 网格 -->
<div id="container"></div>

<!-- 统计 -->
<div id="stats" class="stats"></div>

<div id="resetMenu" class="menu">
  <div class="menu-grid">
    <div id="typeList" class="menu-left"></div>
    <div id="nameList" class="menu-right"></div>
  </div>
</div>

<script src="./mobile-script.js" defer></script>

</body>
</html>
