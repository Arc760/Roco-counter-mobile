<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>计数器</title>

<style>
  body { text-align:center; font-family:Arial; }
  .item { display:inline-block; margin:10px; }
  img { width:120px; cursor:pointer; }
  .count { font-size:18px; }
  #stats { margin-top:20px; font-size:20px; }
  
  .top-bar {
    position: relative;
    height: 50px;
}

.reset-btn {
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  color: rgb(255, 255, 255);

  background: linear-gradient(135deg, #00d5ff);
  border: none;
  border-radius: 12px;

  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);

  transition: all 0.2s ease;

  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.reset-btn:hover {
  transform: translateX(-50%) scale(1.05); /* ⭐必须带回居中 */
  box-shadow: 0 6px 14px rgba(0,0,0,0.4);
}

.reset-btn:active {
  transform: translateX(-50%) scale(0.95); /* ⭐同理 */
}

.undo-btn {
  background: none;
  border: none;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;

  color: #000dff;

  padding: 5px 10px;
  border-radius: 8px;
}

.undo-btn:hover {
  transform: scale(1.2);
  color: #000;
}

/* 左文本 */
.left-text {
  position: absolute;
  right: calc(50% + 80px);
  top: 50%;
  transform: translateY(-50%);
  font-weight:bold;
}

.right-group {
  position: absolute;
  left: calc(50% + 80px); /* 紧贴Reset右边 */
  display: flex;
  align-items: center;
  gap: 6px;
}

.desc {
  font-size: 14px;
  color: #666;
}

.menu {
  position: absolute;
  display: none;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  padding: 8px;
  z-index: 9999;
  width: 320px;
}

/* 双列容器 */
.menu-grid {
  display: flex;
}

/* 左列：属性 */
.menu-left {
  width: 40%;
  border-right: 1px solid #eee;
}

/* 右列：精灵 */
.menu-right {
  width: 60%;
  padding-left: 10px;
}

.menu-item {
  padding: 6px;
  cursor: pointer;
  border-radius: 6px;
}

.menu-item:hover {
  background: #f2f2f2;
}

</style>
</head>

<body>

<div class="top-bar">

  <div class="left-text">点击图片计数</div>

  <button class="reset-btn" onclick="resetAll()">Reset</button>
  <div class="right-group">
    <button class="undo-btn" onclick="undo()">⮪</button>
    <span class="desc">左键+1|右键-1|长按选择数值|右键重置菜单</span>
  </div>

</div>

<div id="container"></div>
<div id="stats"></div>

<div id="typeMenu" class="menu"></div>
<script src="./script.js?v=1"></script>
</body>
</html>
