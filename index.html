<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>计数器</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
}

/* 顶部栏 */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 1000;
  height: 50px;
  display: flex;
  align-items: center;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* 按钮居中 */
.center-group {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
}

/* 提示文字 */
.left-text {
  margin-left: 10px;
  font-size: 11px;
  color: #666;
  white-space: nowrap;
}

/* 按钮样式统一 */
.reset-btn, .undo-btn {
  font-size: 12px;
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  background: #00bfff;
  color: white;
}

.reset-btn {
  touch-action: none;
  user-select: none;
}
.undo-btn {
  font-weight: bold;
}

/* 按钮 */
button {
  font-size: 12px;
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  background: #00bfff;
  color: white;

  min-width: 60px;
}

button:active {
  transform: scale(0.95);
}

/* 网格 */
#container {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 4px;
  padding: 6px;

  grid-auto-flow: column; /* ⭐关键 */
}

/* 卡片 */
.item {
  background: white;
  padding: 6px;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);

  font-size: 10px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  touch-action: none;
  
  -webkit-tap-highlight-color: transparent;

  aspect-ratio: 1 / 1;
}

/* 图片 */
.item img {
  width: 100%;
  height: 70px;
  object-fit: contain;
  display: block;
}

/* 名字 */
.item div {
  font-size: 11px;
}

.item.empty {
  background: transparent;
  box-shadow: none;
}

#grid16, #grid6 {
  display: grid;
  gap: 4px;
}

/* 上面 4×4 */
#grid16 {
  grid-template-columns: repeat(4, 1fr);
}

/* 下面 3×2 */
#grid6 {
  grid-template-columns: repeat(3, 1fr);
}

/* 数字 */
.count {
  font-size: 12px;
  font-weight: bold;
  color: #aaa;
}

.count.active {
  color: #00bfff;
}

/* 统计栏 */
.stats {
  margin: 10px;
  padding: 10px;
  background: white;
  border-radius: 10px;
  font-size: 12px;
  text-align: center;
}

/* 菜单 */
.menu {
  position: absolute;
  display: none;
  z-index: 9999;
  background: white;
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  padding: 8px;
  width: 240px;
  max-height: 60vh;
  overflow: auto;
}

.menu-grid {
  display: flex;
}

.menu-left,
.menu-right {
  width: 50%;
  max-height: 300px;
  overflow-y: auto;
}

.menu-left {
  border-right: 1px solid #eee;
}

.menu-item {
  padding: 6px;
  font-size: 12px;
  text-align: center;
  cursor: pointer;
  border-radius: 6px;
}

.menu-item:hover {
  background: #f2f2f2;
}

</style>
</head>

<body>

<!-- 顶部 -->
<div class="top-bar">

  <div class="center-group">
    <button class="reset-btn">重置</button>
    <button class="undo-btn">⮪</button>
  </div>

  <div class="left-text">
    点击+1 | 右滑-1 |长按输入
  </div>

</div>

<!-- 网格 -->
<div id="container"></div>

<!-- 统计 -->
<div id="stats" class="stats"></div>

<div id="resetMenu" class="menu">
  <div class="menu-grid">
    <div id="typeList" class="menu-left"></div>
    <div id="nameList" class="menu-right"></div>
  </div>
</div>

<div id="grid16"></div>
<div id="grid6"></div>

<script src="./mobile-script.js" defer></script>

</body>
</html>
