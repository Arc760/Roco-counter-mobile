<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>计数器</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
  user-select: none;
  display: flex;
  flex-direction: column;
}

/* 顶部栏 */
.top-bar {
  display: flex;
  align-items: center;

  padding: 8px;
  background: white;
  border-bottom: 1px solid #ddd;
}

/* 左文本 */
.left-text {
  font-size: 11px;
  color: #666;
  flex: 1;
}

/* 右按钮组 */
.top-bar > div:last-child {
  display: flex;
  gap: 6px;
}

/* 按钮 */
button {
  font-size: 12px;
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  background: #00bfff;
  color: white;
}

button:active {
  transform: scale(0.95);
}

/* 网格 */
#container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 6px;
  padding: 8px;
}
#stats {
  width: 100%;
}

/* 宠物图片*/
.item {
  background: white;
  border-radius: 10px;
  padding: 6px;
  text-align: center;

  box-shadow: 0 2px 6px rgba(0,0,0,0.08);

  display: flex;
  flex-direction: column;
  align-items: center;   /* ⭐居中 */
  justify-content: center;

  transition: transform 0.12s ease; /*动画*/
}

.item img {
  width: 90%;
  height: 70px;
  object-fit: contain;

  display: block;
  margin: 0 auto;   /* ⭐强制居中 */
}

.item:active {
  transform: scale(0.92);
}

.count {
  font-size: 12px;
  font-weight: bold;

  color: #aaa; /* 默认灰色 */
}

.count.active {
  color: #00bfff;
}


/* 统计 */
.stats {
  margin: 10px;
  padding: 10px;
  background: white;
  border-radius: 10px;
  font-size: 13px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="top-bar">

  <div class="left-text">
    点击+1 / 右滑-1 / 长按输入
  </div>

  <div>
    <button class="reset-btn">重置</button>
    <button class="undo-btn">⮪</button>
  </div>

</div>

<!-- 网格 -->
<div id="container"></div>

<!-- 统计 -->
<div id="stats" class="stats"></div>

<script src="./mobile-script.js" defer></script>

</body>
</html>
