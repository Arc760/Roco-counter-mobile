<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>宠物计数器</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  user-select:none;
  -webkit-user-select:none;
}

/* 顶部 */
.top-bar{
  position:sticky;
  top:0;
  height:50px;
  display:flex;
  align-items:center;
  background:white;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  z-index:10;
}

.center-group{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:6px;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#00bfff;
  color:white;
  font-size:12px;
}

.reset-btn{
  touch-action: none;
}

.top-bar{
  position:sticky;
  top:0;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:white;
  padding:0 10px;
}

.left-text{
  font-size:11px;
  color:#666;
  white-space:nowrap;
}

.center-group{
  display:flex;
  gap:6px;
}

/* 网格 */
#container{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:4px;
  padding:6px;
}

.item{
  background:white;
  border-radius:8px;
  text-align:center;
  aspect-ratio:1/1;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.item img{
  width:80%;
  height:60%;
  object-fit:contain;
}

.count{
  font-size:12px;
  color:#aaa;
}

.count.active{
  color:#00bfff;
}

.item.empty{
  background:transparent;
  box-shadow:none;
}

/* 统计 */
#stats{
  margin:10px;
  background:white;
  padding:8px;
  border-radius:8px;
  font-size:12px;
}

/* 菜单 */
.menu{
  position:fixed;
  display:none;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  width:260px;
  background:white;
  border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
  padding:10px;
  display:flex;
  gap:10px;
  z-index:9999;
}

.menu-col{
  flex:1;
  max-height:300px;
  overflow:auto;
  border-right:1px solid #eee;
}

.menu-col:last-child{
  border-right:none;
}

.menu-item{
  padding:6px;
  font-size:12px;
  text-align:center;
  border-radius:6px;
}

.menu-item:active{
  background:#eee;
}
</style>
</head>

<body>

<div class="top-bar">

  <div class="left-text">
    点击+1 | 右滑-1 | 长按输入
  </div>

  <div class="center-group">
    <button class="reset-btn">重置</button>
    <button class="undo-btn">撤回</button>
  </div>

</div>

<div id="container"></div>
<div id="stats"></div>

<div id="resetMenu" class="menu">
  <div class="menu-col" id="typeList"></div>
  <div class="menu-col" id="petList"></div>
</div>

<script src="./mobile-script.js"defer></script>

</body>
</html>
