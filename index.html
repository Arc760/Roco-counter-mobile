<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>计数器</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
}

/* 顶部栏 */
.top-bar {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: white;
  padding: 0 10px;
  position: sticky;
  top: 0;
  z-index: 1000;
}

/* 提示文字 */
.left-text {
  font-size: 11px;
  color: #999;
}

.center-group {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
}


/* 按钮样式统一 */
.reset-btn, .undo-btn {
  font-size: 12px;
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  background: #00bfff;
  color: white;
}

.reset-btn {
  touch-action: none;
  user-select: none;
}
.undo-btn {
  font-weight: bold;
}

/* 按钮 */
button {
  font-size: 12px;
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  background: #00bfff;
  color: white;

  min-width: 60px;
}

button:active {
  transform: scale(0.95);
}

/* ===== 核心：响应式网格 ===== */
#container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: 6px;
  padding: 6px;
}

/* 手机优化 */
@media (orientation: landscape) {
  #container {
    grid-template-columns: repeat(8, 1fr);
  }
}

.grid-wrapper {
  min-width: 100%;
}

/* 卡片 */
.item {
  aspect-ratio: 1 / 1;
  background: white;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 11px;

  touch-action: none; /* ❗必须是 none */
}

.item * {
  pointer-events: none; /* ⭐所有子元素不抢事件 */
}

.item img {
  width: 80%;
  height: auto;
  pointer-events: none;
  image-rendering: auto;
}
/* 名字 */
.item div {
  font-size: 11px;
}

/* 数字 */
.count {
  font-size: 12px;
  font-weight: bold;
  color: #aaa;
}

.count.active {
  color: #00bfff;
}

/* 统计栏 */
#stats {
  position: sticky;
  bottom: 0;
  background: #fff;
  padding: 8px;
  font-size: 12px;
  color: #888;
  text-align: center;
  border-top: 1px solid #eee;
}

/* 横屏优化 */
@media (orientation: landscape) {
  #stats {
    position: static;
  }
}

.stat-item {
  color: #aaa;
  transition: 0.2s;
}

.stat-item.active {
  color: #000;
  font-weight: normal;
}

/* 菜单 */
.menu {
  position: absolute;
  display: none;
  z-index: 9999;
  background: white;
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  padding: 8px;
  width: 240px;
  max-height: 60vh;
  overflow: auto;

  position: fixed;
}

.menu-grid {
  display: flex;
}

.menu-left,
.menu-right {
  width: 50%;
  max-height: 300px;
  overflow-y: auto;
}

.menu-left {
  border-right: 1px solid #eee;
}

.menu-item {
  padding: 6px;
  font-size: 12px;
  text-align: center;
  cursor: pointer;
  border-radius: 6px;
}

.menu-item:hover {
  background: #f2f2f2;
}

</style>
</head>

<body>

<!-- 顶部 -->
<div class="top-bar">

  <div class="center-group">
    <button class="reset-btn">重置</button>
    <button class="undo-btn">⬅</button>
  </div>

  <div class="left-text">
    点击+1 | 右滑-1 |长按输入|右滑重置出现重置菜单
  </div>

</div>

<!-- 网格 -->
<div class="grid-wrapper">
  <div id="container"></div>
</div>

<!-- 统计 -->
<div id="stats" class="stats"></div>

<div id="resetMenu" class="menu">
  <div class="menu-grid">
    <div id="typeList" class="menu-left"></div>
    <div id="nameList" class="menu-right"></div>
  </div>
</div>

<script src="mobile-script.js" defer></script>

</body>
</html>
