<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>计数器</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      -webkit-user-select: none;
      user-select: none;
}
    .item {
      background: white;
      border-radius: 12px;
      padding: 8px;
      text-align: center;
    
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
    .item img {
  width: 100%;
  height: 100px;
  object-fit: cover;
  border-radius: 8px;

  touch-action: none; /* ⭐防止滚动冲突 */
}
     
  img { width: 100px;
      height: 100px;
      user-select: none;
      touch-action: none; 
  }
    
  .top-bar {
    position: sticky;
    top: 0;
    background: white;
    z-index: 10;
  
    display: flex;
    align-items: center;
    justify-content: space-between;
  
    padding: 8px 10px;
    border-bottom: 1px solid #ddd;
  }
    .left-text {
  font-size: 14px;
  font-weight: bold;
}
    .right-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.desc {
  font-size: 10px;
  color: #666;
}
    .reset-btn {
  font-size: 12px;
  padding: 6px 10px;
  border: none;
  border-radius: 8px;
  background: #00bfff;
  color: white;
}
    .undo-btn {
  font-size: 18px;
  border: none;
  background: none;
}
    #container {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* 手机2列 */
  gap: 10px;
  padding: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 10px;
  }
      
  </style>
</head>

<body>

  <div class="top-bar">
  <button onclick="undo()">撤回</button>
  <button onclick="resetAll()">重置</button>

  <div id="text1">统计信息</div>
  <div id="text2">提示信息</div>
  </div>

<div id="container" class="grid"></div>
<div id="container"></div>

<script src="./mobile-script.js" defer></script>

</body>
</html>
